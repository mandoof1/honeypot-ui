services:
  - type: web
    name: honeysentinel-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      python -m spacy download en_core_web_sm
      mkdir -p backend/models backend/data
      python -c "
      import sys
      sys.path.insert(0, 'backend')
      from app.ai.classifier import classifier
      from app.ai.anomaly_detector import anomaly_detector
      classifier._ensure_loaded()
      anomaly_detector._ensure_loaded()
      print('AI models initialized')
      "
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: honeysentinel-db
          property: connectionStringInternal
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: honeysentinel-db
          property: connectionStringInternal
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: MODEL_PATH_RF
        value: ./models/random_forest_model.pkl
      - key: MODEL_PATH_IF
        value: ./models/isolation_forest_model.pkl
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: ALERT_EMAIL_FROM
        value: ""
      - key: HONEYPOT_INGEST_TOKEN
        generateValue: true

  - type: web
    name: honeysentinel-honeypot
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r honeypot/requirements.txt
      mkdir -p honeypot/data/sessions honeypot/data/uploads honeypot/data/logs
    startCommand: cd honeypot && python -m honeypot.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BACKEND_API_URL
        fromService:
          name: honeysentinel-api
          type: pserv
          property: host
          envVarKey: BACKEND_HOST
      - key: HONEYPOT_INGEST_TOKEN
        fromService:
          name: honeysentinel-api
          type: pserv
          property: envVar
          envVarKey: HONEYPOT_INGEST_TOKEN
      - key: HONEYPOT_BIND_ADDRESS
        value: 0.0.0.0
      - key: HONEYPOT_SSH_PORT
        value: 2222
      - key: HONEYPOT_FTP_PORT
        value: 2121
      - key: HONEYPOT_HTTP_PORT
        value: 8080
      - key: HONEYPOT_OPERATIONAL_MODE
        value: active
      - key: HONEYPOT_ANTI_FINGERPRINT
        value: "true"
      - key: HONEYPOT_ADAPTIVE_RESPONSE
        value: "true"

databases:
  - name: honeysentinel-db
    databaseName: honeysentinel
    user: honeysentinel
    plan: free
    region: oregon
