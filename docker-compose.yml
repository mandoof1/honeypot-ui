version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: honeysentinel-db
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_DB: honeysentinel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: honeysentinel-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: honeysentinel-redis
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeysentinel-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://honeypot:honeypot@postgres:5432/honeysentinel
      - DATABASE_URL_SYNC=postgresql+psycopg2://honeypot:honeypot@postgres:5432/honeysentinel
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=change-this-to-a-secure-random-string-in-production
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASSWORD=
      - ALERT_EMAIL_FROM=
      - COWRIE_API_URL=http://honeypot:2222
      - DIONAEA_API_URL=http://honeypot:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - honeypot_isolated
    volumes:
      - ./backend:/app
      - model_data:/app/models
    command: >
      sh -c "
        python -m spacy download en_core_web_sm &&
        python -c 'from app.seed import seed_database; import asyncio; asyncio.run(seed_database())' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  honeypot:
    build:
      context: ./honeypot
      dockerfile: Dockerfile
    container_name: honeysentinel-honeypot
    environment:
      - HONEYPOT_CONTAINER=true
      - HONEYPOT_BIND_ADDRESS=0.0.0.0
      - HONEYPOT_SSH_PORT=2222
      - HONEYPOT_FTP_PORT=2121
      - HONEYPOT_HTTP_PORT=8080
      - HONEYPOT_HTTPS_PORT=8443
      - HONEYPOT_OPERATIONAL_MODE=active
      - HONEYPOT_MAX_CONN_PER_IP=5
      - HONEYPOT_CONN_TIMEOUT=300
      - HONEYPOT_RATE_LIMIT=60
      - HONEYPOT_ANTI_FINGERPRINT=true
      - HONEYPOT_BANNER_ROTATION=3600
      - HONEYPOT_RESPONSE_DELAY_MIN=0.05
      - HONEYPOT_RESPONSE_DELAY_MAX=0.5
      - HONEYPOT_ENABLE_ISOLATION=true
      - HONEYPOT_DOCKER_NETWORK=honeypot_isolated
      - HONEYPOT_ADAPTIVE_RESPONSE=true
      - HONEYPOT_PROFILE_UPDATE=60
      - HONEYPOT_CAPTURE_DIR=/app/data/sessions
      - HONEYPOT_FILE_CAPTURE_DIR=/app/data/uploads
      - HONEYPOT_LOG_DIR=/app/data/logs
      - BACKEND_API_URL=http://backend:8000/api/v1
      - HONEYPOT_INGEST_TOKEN=honeypot-ingest-token-change-in-production
    ports:
      - "2222:2222"
      - "2121:2121"
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - backend
    networks:
      - honeypot_isolated
    volumes:
      - ./honeypot:/app
      - honeypot_data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /var/run:noexec,nosuid,size=10M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: honeysentinel-frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - internal
    volumes:
      - .:/app
      - /app/node_modules

networks:
  internal:
    driver: bridge
    internal: false
  honeypot_isolated:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  pgdata:
  esdata:
  model_data:
  honeypot_data:
